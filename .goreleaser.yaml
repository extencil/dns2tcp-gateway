version: 2

builds:
  - id: dns2tcp-gateway
    main: ./cmd/dns2tcp
    binary: dns2tcp-gateway
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/ohmymex/dns2tcp-gateway/internal/version.Version={{.Version}}
      - -X github.com/ohmymex/dns2tcp-gateway/internal/version.Commit={{.ShortCommit}}
      - -X github.com/ohmymex/dns2tcp-gateway/internal/version.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: dns2tcp-gateway
    builds:
      - dns2tcp-gateway
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc

release:
  github:
    owner: ohmymex
    name: dns2tcp-gateway
